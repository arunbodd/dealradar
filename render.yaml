services:
  - type: web
    name: dealradar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AUTO_DEV_API_KEY
        sync: false
      - key: DB_PATH
        value: /tmp/inventory.db
